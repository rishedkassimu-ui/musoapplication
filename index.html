<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MUSO Registration System</title>
    <style>
        :root {
            --primary: #2563eb;
            --purple: #6d28d9; 
            --purple-hover: #5b21b6;
            --success: #16a34a;
            --dark: #1e293b;
            --light: #f8fafc;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f1f5f9;
            margin: 0;
            padding: 0;
            color: var(--dark);
        }
        header {
            background-color: var(--primary);
            color: white;
            padding: 1rem;
            text-align: center;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
            position: relative;
        }

        /* Visible STAFF login link in header */
        .staff-login-link {
            position: absolute;
            top: 50%;
            right: 1.5rem;
            transform: translateY(-50%);
            font-size: 0.75rem;
            font-weight: 700;
            letter-spacing: 0.1em;
            color: rgba(255,255,255,0.7);
            cursor: pointer;
            text-transform: uppercase;
            border: 1px solid rgba(255,255,255,0.35);
            padding: 0.3rem 0.7rem;
            border-radius: 4px;
            transition: all 0.2s ease;
            user-select: none;
        }
        .staff-login-link:hover {
            color: #fff;
            border-color: rgba(255,255,255,0.8);
            background: rgba(255,255,255,0.1);
        }

        .container {
            max-width: 1100px;
            margin: 2rem auto;
            padding: 0 1rem;
            transition: max-width 0.3s ease;
        }
        .card {
            background: white;
            padding: 2.5rem;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.08);
            margin-bottom: 2rem;
        }
        
        .form-header-img {
            display: flex;
            align-items: center;
            margin-bottom: 2rem;
        }

        .step-text {
            font-size: 1.2rem;
            margin: 0;
            color: #4c1d95;
            font-weight: 600;
        }
        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem 2rem;
        }
        @media (max-width: 768px) {
            .form-grid { grid-template-columns: 1fr; }
            .staff-login-link { font-size: 0.65rem; padding: 0.25rem 0.5rem; right: 0.75rem; }
        }
        .form-group {
            margin-bottom: 0.5rem;
        }
        label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 600;
            text-transform: uppercase;
            font-size: 0.8rem;
            color: #475569;
        }
        input, select {
            width: 100%;
            padding: 0.8rem;
            border: 1px solid #cbd5e1;
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 1rem;
        }
        button {
            border: none;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.2s;
            border-radius: 8px;
            padding: 1rem 2rem;
            font-size: 1rem;
        }
        .btn-purple {
            background-color: var(--purple);
            color: white;
            float: right;
            margin-top: 1rem;
        }
        .btn-purple:hover { background-color: var(--purple-hover); }
        .clearfix::after {
            content: ""; clear: both; display: table;
        }
        
        .btn-success { background-color: var(--success); color: white; }
        .btn-success:hover { background-color: #15803d; }
        .btn-secondary { background-color: #64748b; color: white; padding: 0.75rem;}
        .btn-secondary:hover { background-color: #475569; }
        .btn-sm { padding: 0.5rem 1rem; font-size: 0.85rem; }

        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .modal-box {
            background: white;
            padding: 2rem;
            border-radius: 8px;
            text-align: center;
            max-width: 400px;
            width: 90%;
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1);
        }
        .modal-text {
            font-size: 1.1rem;
            margin-bottom: 1.5rem;
            color: var(--dark);
            font-weight: 500;
        }
        .modal-btn {
            background-color: var(--success);
            color: white;
            width: 100%;
            padding: 0.8rem;
        }

        .toast {
            position: fixed;
            top: 20px;
            right: 20px;
            background-color: #16a34a;
            color: white;
            padding: 1rem 1.5rem;
            border-radius: 6px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            transform: translateX(150%);
            transition: transform 0.4s ease-in-out;
            z-index: 1100;
            font-weight: 600;
        }
        .toast.show {
            transform: translateX(0);
        }

        .section-hidden { display: none !important; }
        .admin-controls {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
            margin-bottom: 1.5rem;
            background: #f8fafc;
            padding: 1rem;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
        }
        
        .table-responsive { overflow-x: auto; }
        table {
            width: 100%; border-collapse: collapse; margin-top: 1rem; background: white;
        }
        th, td {
            border: 1px solid #e2e8f0; padding: 0.75rem; text-align: left; font-size: 0.9rem;
            white-space: nowrap;
        }
        th { background-color: #f8fafc; color: var(--dark); text-align: center; }
        .score-input { width: 60px; padding: 0.3rem; text-align: center; border-radius: 4px; }
        .score-input:disabled { background-color: #e2e8f0; color: #475569; }

        footer {
            text-align: center; padding: 2rem; margin-top: 5rem;
            background-color: #e2e8f0; font-size: 0.9rem; color: #475569;
        }

        /* Staff login modal — password only */
        .auth-modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.55);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 2000;
        }
        .auth-modal-box {
            background: white;
            padding: 2rem 2.5rem;
            border-radius: 12px;
            max-width: 380px;
            width: 92%;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }
        .auth-modal-title {
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--dark);
            margin-bottom: 1.5rem;
            text-align: center;
        }
        .auth-modal-box label {
            text-transform: uppercase;
            font-size: 0.75rem;
            font-weight: 600;
            color: #475569;
            margin-bottom: 0.4rem;
        }
        .auth-modal-box input {
            margin-bottom: 1rem;
        }
        .auth-error {
            color: #dc2626;
            font-size: 0.85rem;
            margin-bottom: 0.75rem;
            text-align: center;
            min-height: 1.2rem;
        }
        .auth-btn-row {
            display: flex;
            gap: 0.75rem;
            margin-top: 0.5rem;
        }
        .auth-btn-row button { flex: 1; }

        #tableLegend {
            margin-bottom: 1rem; font-size: 0.85rem; color: #475569; background: #f8fafc; 
            padding: 15px; border-radius: 6px; border: 1px solid #e2e8f0; display: none; line-height: 1.6;
        }
    </style>
</head>
<body>

<header>
    <h1 id="page-title">MUSO Registration System</h1>
    <!-- Visible STAFF login for interviewers -->
    <div class="staff-login-link" onclick="openStaffLogin()">STAFF</div>
</header>

<div id="systemModal" class="modal-overlay section-hidden">
    <div class="modal-box">
        <p id="modalMessage" class="modal-text"></p>
        <button class="modal-btn" onclick="closeModal()">Sawa, ahsante!</button>
    </div>
</div>

<!-- Staff Login Modal — password only, no email, no Firebase -->
<div id="authModal" class="auth-modal-overlay section-hidden">
    <div class="auth-modal-box">
        <p class="auth-modal-title">STAFF Login</p>
        <label>Staff Password</label>
        <input type="password" id="authPassword" placeholder="Enter staff password" autocomplete="current-password">
        <div id="authError" class="auth-error"></div>
        <div class="auth-btn-row">
            <button class="btn-secondary" onclick="closeAuthModal()">Cancel</button>
            <button class="btn-purple" id="authSubmitBtn" onclick="submitLogin()" style="float:none; margin-top:0;">Login</button>
        </div>
    </div>
</div>

<div id="toastNotification" class="toast">Marks saved successfully!</div>

<div class="container">
    <div id="registration-view" class="card">
        <div class="form-header-img">
            <h2 class="step-text">Please enter your details correctly to successfully complete registration process</h2>
        </div>
        
        <form id="registrationForm" class="clearfix">
            <div class="form-grid">
                <div class="form-group">
                    <label>FULL NAME *</label>
                    <input type="text" id="fullName" required value="">
                </div>
                <div class="form-group">
                    <label>REGISTRATION NUMBER *</label>
                    <input type="text" id="regNumber" required value="">
                </div>
                <div class="form-group">
                    <label>PROGRAMME / COURSE *</label>
                    <input type="text" id="programme" required value="">
                </div>
                <div class="form-group">
                    <label>YEAR OF STUDY *</label>
                    <select id="yearOfStudy" required>
                        <option value="" disabled selected>-- Choose Year --</option>
                        <option value="1">1</option>
                        <option value="2">2</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>PHONE NUMBER *</label>
                    <input type="text" id="phoneNum" required value="">
                </div>
                <div class="form-group">
                    <label>SELECT POSITION *</label>
                    <select id="position" required>
                        <option value="" disabled selected>-- Choose Position --</option>
                        <option value="Computer Position">Computer Position</option>
                        <option value="Welcome Position">Welcome Position</option>
                    </select>
                </div>
            </div>
            
            <button type="submit" class="btn-purple">submit</button>
        </form>
    </div>

    <div id="portal-view" class="card section-hidden">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem;">
            <h2 id="portal-heading">Interviewer Entry Scoring Matrix</h2>
            <button onclick="logout()" class="btn-secondary" style="width: auto;">Exit Panel</button>
        </div>

        <div id="adminFilters">
            <h3 style="margin-top: 0; color: #1e293b; border-bottom: 2px solid #e2e8f0; padding-bottom: 0.5rem;">Search & Filter Applicants</h3>
            <div class="admin-controls" style="background: white;">
                <div class="form-group">
                    <label>Filter by Name</label>
                    <input type="text" id="filterName" oninput="renderTable()" placeholder="Type to search..." value="">
                </div>
                <div class="form-group">
                    <label>Filter by Position</label>
                    <select id="filterPosition" onchange="renderTable()">
                        <option value="All">All Positions</option>
                        <option value="Computer Position">Computer Position</option>
                        <option value="Welcome Position">Welcome Position</option>
                    </select>
                </div>
            </div>
        </div>

        <div id="tableLegend"></div>
        <div class="table-responsive">
            <table id="applicantsTable">
                <thead></thead>
                <tbody id="applicantsBody"></tbody>
            </table>
        </div>
    </div>
</div>

<!-- Footer: dead text, no onclick -->
<footer>
    All rights reserved, a product by RishedKassimu
</footer>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
    import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBwxClwEiH6Gm_2lPquWeBJuqK4SOfI9jk",
      authDomain: "interview-8ca72.firebaseapp.com",
      projectId: "interview-8ca72",
      storageBucket: "interview-8ca72.firebasestorage.app",
      messagingSenderId: "692697536483",
      appId: "1:692697536483:web:7ee50288b98029ea8b72d6"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    window.syncToFirebase = function(applicantsData, configData) {
        setDoc(doc(db, "MUSO_System", "DatabaseState"), {
            applicants: applicantsData,
            config: configData
        }).catch(err => console.error("Firebase Sync Error: ", err));
    };

    getDoc(doc(db, "MUSO_System", "DatabaseState")).then((docSnap) => {
        if (docSnap.exists()) {
            const cloudData = docSnap.data();
            if (cloudData.applicants) {
                window.applicants = cloudData.applicants;
                localStorage.setItem('applicants', JSON.stringify(cloudData.applicants));
            }
            if (cloudData.config) {
                window.config = cloudData.config;
                localStorage.setItem('sysConfig', JSON.stringify(cloudData.config));
            }
            if (typeof window.renderTable === 'function') {
                window.renderTable();
            }
        }
    }).catch(err => console.log("System running on LocalStorage backup."));
</script>

<script>
    window.applicants = JSON.parse(localStorage.getItem('applicants')) || [];
    
    window.config = JSON.parse(localStorage.getItem('sysConfig')) || {
        interviewerPass: "interviewer123",
        startTime: "",
        endTime: "",
        columns: {
            "Computer Position": [],
            "Welcome Position": []
        }
    };

    let currentRole = 'applicant';

    function saveDatabaseState() {
        localStorage.setItem('applicants', JSON.stringify(window.applicants));
        localStorage.setItem('sysConfig', JSON.stringify(window.config));
        if (typeof window.syncToFirebase === 'function') {
            window.syncToFirebase(window.applicants, window.config);
        }
    }

    function showModal(message) {
        document.getElementById('modalMessage').innerText = message;
        document.getElementById('systemModal').classList.remove('section-hidden');
    }
    function closeModal() {
        document.getElementById('systemModal').classList.add('section-hidden');
    }

    function showToast(message) {
        const toast = document.getElementById('toastNotification');
        toast.innerText = message;
        toast.classList.add('show');
        setTimeout(() => { toast.classList.remove('show'); }, 10000);
    }

    document.getElementById('registrationForm').addEventListener('submit', function(e) {
        e.preventDefault();
        
        let now = new Date();
        let start = window.config.startTime ? new Date(window.config.startTime) : null;
        let end = window.config.endTime ? new Date(window.config.endTime) : null;

        if (start && now < start) {
            showModal("Tafadhali, hatuwezi kupokea maombi yako, mda wa usajili bado haujafika");
            return;
        }
        if (end && now > end) {
            showModal("Tafadhali hatuwezi kupokea maombi yako kwasababu umechelewa kufanya maombi");
            return;
        }
        
        const newApplicant = {
            id: Date.now(),
            name: document.getElementById('fullName').value,
            regNo: document.getElementById('regNumber').value,
            programme: document.getElementById('programme').value,
            year: document.getElementById('yearOfStudy').value,
            phone: document.getElementById('phoneNum').value,
            position: document.getElementById('position').value,
            marks: {}
        };

        window.applicants.push(newApplicant);
        saveDatabaseState();
        showModal("Hongera, maombi yako yamepokelewa na unaombwa kuhudhuria interview pindi serikali itakapotangaza");
        this.reset();
        window.scrollTo(0, 0);
        if(currentRole !== 'applicant') renderTable();
    });

    // Staff login — password only
    window.openStaffLogin = function() {
        document.getElementById('authPassword').value = '';
        document.getElementById('authError').innerText = '';
        document.getElementById('authModal').classList.remove('section-hidden');
        setTimeout(() => document.getElementById('authPassword').focus(), 100);
    };

    window.closeAuthModal = function() {
        document.getElementById('authModal').classList.add('section-hidden');
    };

    document.getElementById('authPassword').addEventListener('keydown', function(e) {
        if (e.key === 'Enter') submitLogin();
    });

    window.submitLogin = function() {
        const password = document.getElementById('authPassword').value;
        const errorEl = document.getElementById('authError');
        errorEl.innerText = '';

        if (!password) {
            errorEl.innerText = 'Please enter the staff password.';
            return;
        }

        // Re-read config from storage in case it was updated by admin
        const freshConfig = JSON.parse(localStorage.getItem('sysConfig'));
        const validPass = freshConfig ? freshConfig.interviewerPass : window.config.interviewerPass;

        if (password === validPass) {
            currentRole = 'interviewer';
            closeAuthModal();
            switchView('portal');
        } else {
            errorEl.innerText = 'Wrong staff password. Please try again.';
        }
    };

    function switchView(view) {
        if (view === 'portal') {
            document.getElementById('registration-view').classList.add('section-hidden');
            document.getElementById('portal-view').classList.remove('section-hidden');
            document.querySelector('.container').style.maxWidth = '100%';
            document.querySelector('.table-responsive').style.overflowX = 'visible';
            renderTable();
        } else {
            document.getElementById('registration-view').classList.remove('section-hidden');
            document.getElementById('portal-view').classList.add('section-hidden');
            document.querySelector('.container').style.maxWidth = '1100px';
            currentRole = 'applicant';
        }
    }

    window.logout = function() { switchView('registration'); };

    window.renderTable = function() {
        const filterName = document.getElementById('filterName').value.toLowerCase();
        const filterPos = document.getElementById('filterPosition').value;
        const tableHead = document.querySelector('#applicantsTable thead');
        const tableBody = document.getElementById('applicantsBody');
        const legendDiv = document.getElementById('tableLegend');

        // Refresh config from storage on each render (picks up admin changes)
        const freshConfig = JSON.parse(localStorage.getItem('sysConfig'));
        if (freshConfig) window.config = freshConfig;

        let processedApplicants = window.applicants.map(app => {
            const cols = window.config.columns[app.position] || [];
            let totalMarks = 0;
            let possibleMax = cols.length * 100;
            cols.forEach((_, index) => {
                let mark = parseFloat(app.marks[index]) || 0;
                totalMarks += mark;
            });
            let percentage = possibleMax > 0 ? ((totalMarks / possibleMax) * 100).toFixed(1) : "0.0";
            return { ...app, totalMarks, percentage: parseFloat(percentage) };
        });

        processedApplicants.sort((a, b) => b.percentage - a.percentage);

        tableHead.innerHTML = '';
        tableBody.innerHTML = '';

        let headerRow = `<tr>
            <th style="text-align:left">Rank</th>
            <th style="text-align:left">Full Name & Details</th>
            <th style="text-align:left">Position Requested</th>`;
        
        let legendHTML = "<strong>TABLE KEY (Abbreviations translation):</strong><br>";
        let charCode = 65;
        
        let compHeaders = window.config.columns["Computer Position"].map(c => {
            let char = String.fromCharCode(charCode++);
            legendHTML += `<span style="margin-right: 20px; display: inline-block;"><strong>${char}</strong> = ${c} (Computer)</span>`;
            return `<th style="background:#eff6ff" title="${c}">${char}</th>`;
        }).join('');
        
        let welHeaders = window.config.columns["Welcome Position"].map(c => {
            let char = String.fromCharCode(charCode++);
            legendHTML += `<span style="margin-right: 20px; display: inline-block;"><strong>${char}</strong> = ${c} (Welcome)</span>`;
            return `<th style="background:#fef2f2" title="${c}">${char}</th>`;
        }).join('');
        
        if(window.config.columns["Computer Position"].length > 0 || window.config.columns["Welcome Position"].length > 0) {
            legendDiv.style.display = 'block';
            legendDiv.innerHTML = legendHTML;
        } else {
            legendDiv.style.display = 'none';
        }
        
        headerRow += compHeaders + welHeaders + `<th>Total Score</th><th>Percentage</th><th>Action</th></tr>`;
        tableHead.innerHTML = headerRow;

        let displayIndex = 1;
        processedApplicants.forEach(app => {
            if(filterName && !app.name.toLowerCase().includes(filterName)) return;
            if(filterPos !== 'All' && app.position !== filterPos) return;

            let isComp = app.position === "Computer Position";
            let rowHtml = `<tr>
                <td><strong>#${displayIndex++}</strong></td>
                <td>
                    <strong>${app.name}</strong><br>
                    <small>${app.regNo} | ${app.programme} (Y${app.year})</small>
                </td>
                <td><em style="color:var(--primary)">${app.position}</em></td>`;

            window.config.columns["Computer Position"].forEach((_, idx) => {
                let currentVal = app.marks[idx] !== undefined ? app.marks[idx] : '';
                if (isComp) {
                    // Staff: disable already-entered marks to prevent overwrite
                    let isDisabled = (currentVal !== '') ? 'disabled' : '';
                    rowHtml += `<td><input type="number" min="0" max="100" class="score-input input-app-${app.id}" data-idx="${idx}" value="${currentVal}" ${isDisabled}></td>`;
                } else {
                    rowHtml += `<td><input type="text" class="score-input" value="-" disabled></td>`;
                }
            });

            window.config.columns["Welcome Position"].forEach((_, idx) => {
                let currentVal = app.marks[idx] !== undefined ? app.marks[idx] : '';
                if (!isComp) {
                    let isDisabled = (currentVal !== '') ? 'disabled' : '';
                    rowHtml += `<td><input type="number" min="0" max="100" class="score-input input-app-${app.id}" data-idx="${idx}" value="${currentVal}" ${isDisabled}></td>`;
                } else {
                    rowHtml += `<td><input type="text" class="score-input" value="-" disabled></td>`;
                }
            });

            rowHtml += `<td style="text-align: center;"><strong>${app.totalMarks}</strong></td>
                <td style="text-align: center;"><span style="color:var(--success); font-weight:bold">${app.percentage}%</span></td>
                <td style="text-align: center;">
                    <button class="btn-success btn-sm" onclick="saveRowMarks(${app.id})">Hifadhi</button>
                </td></tr>`;
            
            tableBody.insertAdjacentHTML('beforeend', rowHtml);
        });
    };

    window.saveRowMarks = function(applicantId) {
        const inputs = document.querySelectorAll(`.input-app-${applicantId}:not(:disabled)`);
        let changesMade = false;
        let targetApplicant = window.applicants.find(a => a.id === applicantId);
        if(!targetApplicant) return;

        inputs.forEach(input => {
            const idx = input.dataset.idx;
            const val = input.value;
            if(idx !== undefined && val !== '') {
                targetApplicant.marks[idx] = val;
                changesMade = true;
            }
        });

        if (changesMade) {
            saveDatabaseState();
            renderTable();
            showToast("Taarifa za alama zimehifadhiwa kikamilifu!");
        }
    };
</script>

</body>
</html>
